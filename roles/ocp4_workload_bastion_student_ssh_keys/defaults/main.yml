---
# Student user name (must match bastion_student_user_name from the bastion role)
ocp4_workload_bastion_student_ssh_keys_user: "{{ bastion_student_user_name | default('lab-user') }}"
ocp4_workload_bastion_student_ssh_keys_group: users

# Bastion SSH key paths (must match the bastion role defaults)
ocp4_workload_bastion_student_ssh_keys_private_key: "{{ bastion_ssh_key_path | default('~/.ssh/{{ guid }}key.pem) }}"
ocp4_workload_bastion_student_ssh_keys_public_key: "{{ bastion_ssh_pubkey_path | default('~/.ssh/{{ guid }}key.pub') }}"
ocp4_workload_bastion_student_ssh_keys_ssh_config: ~/.ssh/config

# Remote user on isolated instances (user to SSH as)
ocp4_workload_bastion_student_ssh_keys_remote_user: "{{ remote_user | default('cloud-user') }}"

# Instances to set up SSH access to (from agnosticv 'isolated' group)
ocp4_workload_bastion_student_ssh_keys_target_hosts: "{{ groups['isolated'] | default([]) }}"

# SSH extra args for reaching isolated hosts (uses the infrastructure SSH config)
_isolated_ssh_extra_args: >-
  -F {{ hostvars['localhost'].output_dir }}/{{ config }}_{{ guid }}_ssh_conf
