galaxy_info:
  role_name: ocp4_workload_bastion_student_ssh_keys
  author:
  - Judd Maltin <jmaltin@redhat.com>
  description: |
    Sets up SSH access between the bastion and all isolated instances.
    Copies SSH keys and a generated SSH config to the student user on the
    bastion, and deploys the bastion public key to authorized_keys on each
    isolated instance (compute01-03, nfsserver, allinone).
