---
- name: Read Cinder NFS configuration file
  ansible.builtin.slurp:
    src: "{{ ocp4_workload_rhoso_deployment_workdir }}/nfs-cinder-conf"
  register: _ocp4_workload_rhoso_deployment_nfs_cinder_conf
  delegate_to: bastion

- name: Create Cinder NFS configuration secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cinder-nfs-config
        namespace: "{{ ocp4_workload_rhoso_deployment_openstack_namespace }}"
      type: Opaque
      data:
        nfs-cinder-conf: "{{ _ocp4_workload_rhoso_deployment_nfs_cinder_conf.content }}"
  delegate_to: bastion

- name: Wait for OpenStack Control Plane CRD
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: openstackcontrolplanes.core.openstack.org
  register: _ocp4_workload_rhoso_deployment_cp_crd
  until: _ocp4_workload_rhoso_deployment_cp_crd.resources | length > 0
  retries: 30
  delay: 10
  delegate_to: bastion

- name: Create OpenStack Control Plane
  kubernetes.core.k8s:
    state: present
    src: "{{ ocp4_workload_rhoso_deployment_workdir }}/osp-ng-ctlplane-deploy.yaml"
  retries: 5
  delay: 10
  delegate_to: bastion

- name: Wait for OpenStack Control Plane to be ready
  kubernetes.core.k8s_info:
    api_version: core.openstack.org/v1beta1
    kind: OpenStackControlPlane
    name: openstack-control-plane
    namespace: "{{ ocp4_workload_rhoso_deployment_openstack_namespace }}"
  register: _ocp4_workload_rhoso_deployment_cp_status
  until: >
    _ocp4_workload_rhoso_deployment_cp_status.resources | length > 0 and
    _ocp4_workload_rhoso_deployment_cp_status.resources[0].status is defined and
    _ocp4_workload_rhoso_deployment_cp_status.resources[0].status.conditions is defined and
    _ocp4_workload_rhoso_deployment_cp_status.resources[0].status.conditions
      | json_query('[?type==`Ready` && status==`True`]') | length > 0
  retries: 360
  delay: 10
  delegate_to: bastion

- name: Determine Control Plane readiness
  ansible.builtin.set_fact:
    _ocp4_workload_rhoso_deployment_cp_ready: >-
      {{ _ocp4_workload_rhoso_deployment_cp_status.resources[0].status.conditions
         | json_query('[?type==`Ready` && status==`True`]') | length > 0 }}
  when:
  - _ocp4_workload_rhoso_deployment_cp_status.resources | length > 0
  - _ocp4_workload_rhoso_deployment_cp_status.resources[0].status is defined
  - _ocp4_workload_rhoso_deployment_cp_status.resources[0].status.conditions is defined
  delegate_to: bastion

- name: Display Control Plane status
  ansible.builtin.debug:
    msg: >-
      OpenStack Control Plane Ready: {{ _ocp4_workload_rhoso_deployment_cp_ready | default('Unknown') }}
  when: _ocp4_workload_rhoso_deployment_cp_status.resources | length > 0
  delegate_to: bastion
