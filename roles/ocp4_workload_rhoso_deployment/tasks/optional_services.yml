---
- name: Enable Heat (Orchestration Service)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: core.openstack.org/v1beta1
      kind: OpenStackControlPlane
      metadata:
        name: openstack-control-plane
        namespace: "{{ ocp4_workload_rhoso_deployment_openstack_namespace }}"
      spec:
        heat:
          enabled: true
    merge_type: merge
  delegate_to: bastion

- name: Enable Swift (Object Storage Service)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: core.openstack.org/v1beta1
      kind: OpenStackControlPlane
      metadata:
        name: openstack-control-plane
        namespace: "{{ ocp4_workload_rhoso_deployment_openstack_namespace }}"
      spec:
        swift:
          enabled: true
    merge_type: merge
  delegate_to: bastion

- name: Wait for Heat services to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ ocp4_workload_rhoso_deployment_openstack_namespace }}"
    label_selectors:
    - "service=heat"
  register: _ocp4_workload_rhoso_deployment_heat_pods
  until: >
    _ocp4_workload_rhoso_deployment_heat_pods.resources | length > 0 and
    _ocp4_workload_rhoso_deployment_heat_pods.resources
      | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
  retries: 60
  delay: 10
  delegate_to: bastion

- name: Wait for Swift services to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ ocp4_workload_rhoso_deployment_openstack_namespace }}"
    label_selectors:
    - "service=swift"
  register: _ocp4_workload_rhoso_deployment_swift_pods
  until: >
    _ocp4_workload_rhoso_deployment_swift_pods.resources | length > 0 and
    _ocp4_workload_rhoso_deployment_swift_pods.resources
      | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
  retries: 60
  delay: 10
  delegate_to: bastion

- name: Get OpenStack client pod for verification
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ ocp4_workload_rhoso_deployment_openstack_namespace }}"
    label_selectors:
    - "service=openstackclient"
  register: _ocp4_workload_rhoso_deployment_osclient
  delegate_to: bastion

- name: Verify Heat orchestration service
  kubernetes.core.k8s_exec:
    namespace: "{{ ocp4_workload_rhoso_deployment_openstack_namespace }}"
    pod: "{{ _ocp4_workload_rhoso_deployment_osclient.resources[0].metadata.name }}"
    command: openstack orchestration service list
  register: _ocp4_workload_rhoso_deployment_heat_svc
  when: _ocp4_workload_rhoso_deployment_osclient.resources | length > 0
  delegate_to: bastion

- name: Verify Swift object storage service
  kubernetes.core.k8s_exec:
    namespace: "{{ ocp4_workload_rhoso_deployment_openstack_namespace }}"
    pod: "{{ _ocp4_workload_rhoso_deployment_osclient.resources[0].metadata.name }}"
    command: openstack object store account show
  register: _ocp4_workload_rhoso_deployment_swift_svc
  when: _ocp4_workload_rhoso_deployment_osclient.resources | length > 0
  ignore_errors: true
  delegate_to: bastion

- name: Optional services summary
  ansible.builtin.debug:
    msg:
    - "=== Optional Services Status ==="
    - "Heat pods running: {{ _ocp4_workload_rhoso_deployment_heat_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length }}"
    - "Swift pods running: {{ _ocp4_workload_rhoso_deployment_swift_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length }}"
    - "Heat orchestration: {{ 'Available' if _ocp4_workload_rhoso_deployment_heat_svc is defined and _ocp4_workload_rhoso_deployment_heat_svc.rc == 0 else 'Not Available' }}"
    - "Swift object storage: {{ 'Available' if _ocp4_workload_rhoso_deployment_swift_svc is defined and _ocp4_workload_rhoso_deployment_swift_svc.rc == 0 else 'Not Available' }}"
  delegate_to: bastion
