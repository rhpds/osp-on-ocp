---
- name: Verify OpenShift cluster access
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
  register: _ocp4_workload_rhoso_deployment_cluster_nodes
  delegate_to: bastion

- name: Display cluster nodes
  ansible.builtin.debug:
    msg: "Cluster has {{ _ocp4_workload_rhoso_deployment_cluster_nodes.resources | length }} nodes"
  delegate_to: bastion

# ---- NMState operator ----

- name: Create NMState operator namespace
  kubernetes.core.k8s:
    name: openshift-nmstate
    api_version: v1
    kind: Namespace
    state: present
    definition:
      metadata:
        labels:
          kubernetes.io/metadata.name: openshift-nmstate
          name: openshift-nmstate
      spec:
        finalizers:
        - kubernetes
  delegate_to: bastion

- name: Create NMState OperatorGroup
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        annotations:
          olm.providedAPIs: NMState.v1.nmstate.io
        name: openshift-nmstate
        namespace: openshift-nmstate
      spec:
        targetNamespaces:
        - openshift-nmstate
  delegate_to: bastion

- name: Wait for NMState OperatorGroup
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1
    kind: OperatorGroup
    namespace: openshift-nmstate
  register: _ocp4_workload_rhoso_deployment_nmstate_og
  until: _ocp4_workload_rhoso_deployment_nmstate_og.resources | length > 0
  retries: 10
  delay: 5
  delegate_to: bastion

- name: Create NMState Subscription
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        labels:
          operators.coreos.com/kubernetes-nmstate-operator.openshift-nmstate: ""
        name: kubernetes-nmstate-operator
        namespace: openshift-nmstate
      spec:
        channel: stable
        installPlanApproval: Automatic
        name: kubernetes-nmstate-operator
        source: redhat-operators
        sourceNamespace: openshift-marketplace
  delegate_to: bastion

- name: Wait for NMState operator CSV to succeed
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: openshift-nmstate
  register: _ocp4_workload_rhoso_deployment_nmstate_csv
  until: >
    _ocp4_workload_rhoso_deployment_nmstate_csv.resources | length > 0 and
    _ocp4_workload_rhoso_deployment_nmstate_csv.resources[0].status is defined and
    _ocp4_workload_rhoso_deployment_nmstate_csv.resources[0].status.phase is defined and
    _ocp4_workload_rhoso_deployment_nmstate_csv.resources[0].status.phase == "Succeeded"
  retries: 60
  delay: 10
  delegate_to: bastion

- name: Wait for NMState CRD
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: nmstates.nmstate.io
  register: _ocp4_workload_rhoso_deployment_nmstate_crd
  until: _ocp4_workload_rhoso_deployment_nmstate_crd.resources | length > 0
  retries: 30
  delay: 10
  delegate_to: bastion

- name: Create NMState instance
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: nmstate.io/v1
      kind: NMState
      metadata:
        name: nmstate
  retries: 5
  delay: 10
  delegate_to: bastion

- name: Verify NMState instance
  kubernetes.core.k8s_info:
    api_version: nmstate.io/v1
    kind: NMState
    name: nmstate
  register: _ocp4_workload_rhoso_deployment_nmstate_instance
  until: _ocp4_workload_rhoso_deployment_nmstate_instance.resources | length > 0
  retries: 10
  delay: 5
  delegate_to: bastion

# ---- MetalLB operator ----

- name: Create MetalLB operator namespace
  kubernetes.core.k8s:
    name: metallb-system
    api_version: v1
    kind: Namespace
    state: present
  delegate_to: bastion

- name: Create MetalLB OperatorGroup
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: metallb-operator
        namespace: metallb-system
  delegate_to: bastion

- name: Wait for MetalLB OperatorGroup
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1
    kind: OperatorGroup
    namespace: metallb-system
  register: _ocp4_workload_rhoso_deployment_metallb_og
  until: _ocp4_workload_rhoso_deployment_metallb_og.resources | length > 0
  retries: 10
  delay: 5
  delegate_to: bastion

- name: Create MetalLB Subscription
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: metallb-operator-sub
        namespace: metallb-system
      spec:
        channel: stable
        name: metallb-operator
        source: redhat-operators
        sourceNamespace: openshift-marketplace
  delegate_to: bastion

- name: Wait for MetalLB operator CSV to succeed
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: metallb-system
  register: _ocp4_workload_rhoso_deployment_metallb_csv
  until: >
    _ocp4_workload_rhoso_deployment_metallb_csv.resources | length > 0 and
    _ocp4_workload_rhoso_deployment_metallb_csv.resources[0].status is defined and
    _ocp4_workload_rhoso_deployment_metallb_csv.resources[0].status.phase is defined and
    _ocp4_workload_rhoso_deployment_metallb_csv.resources[0].status.phase == "Succeeded"
  retries: 60
  delay: 10
  delegate_to: bastion

- name: Wait for MetalLB CRD
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: metallbs.metallb.io
  register: _ocp4_workload_rhoso_deployment_metallb_crd
  until: _ocp4_workload_rhoso_deployment_metallb_crd.resources | length > 0
  retries: 30
  delay: 10
  delegate_to: bastion

- name: Wait for MetalLB webhook service endpoints
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Endpoints
    name: metallb-operator-controller-manager-service
    namespace: metallb-system
  register: _ocp4_workload_rhoso_deployment_metallb_ep
  until: >
    _ocp4_workload_rhoso_deployment_metallb_ep.resources | length > 0 and
    _ocp4_workload_rhoso_deployment_metallb_ep.resources[0].subsets is defined and
    _ocp4_workload_rhoso_deployment_metallb_ep.resources[0].subsets | length > 0 and
    _ocp4_workload_rhoso_deployment_metallb_ep.resources[0].subsets[0].addresses is defined and
    _ocp4_workload_rhoso_deployment_metallb_ep.resources[0].subsets[0].addresses | length > 0
  retries: 30
  delay: 5
  changed_when: false
  delegate_to: bastion

- name: Create MetalLB instance
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: metallb.io/v1beta1
      kind: MetalLB
      metadata:
        name: metallb
        namespace: metallb-system
      spec:
        nodeSelector:
          node-role.kubernetes.io/worker: ""
  retries: 5
  delay: 10
  delegate_to: bastion

- name: Verify MetalLB instance
  kubernetes.core.k8s_info:
    api_version: metallb.io/v1beta1
    kind: MetalLB
    name: metallb
    namespace: metallb-system
  register: _ocp4_workload_rhoso_deployment_metallb_instance
  until: _ocp4_workload_rhoso_deployment_metallb_instance.resources | length > 0
  retries: 10
  delay: 5
  delegate_to: bastion

- name: Wait for MetalLB controller deployment
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: controller
    namespace: metallb-system
  register: _ocp4_workload_rhoso_deployment_metallb_ctrl
  until: >
    _ocp4_workload_rhoso_deployment_metallb_ctrl.resources | length > 0 and
    _ocp4_workload_rhoso_deployment_metallb_ctrl.resources[0].status.readyReplicas is defined and
    _ocp4_workload_rhoso_deployment_metallb_ctrl.resources[0].status.readyReplicas >= 1
  retries: 30
  delay: 10
  delegate_to: bastion

- name: Wait for MetalLB speaker daemonset
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: DaemonSet
    name: speaker
    namespace: metallb-system
  register: _ocp4_workload_rhoso_deployment_metallb_speaker
  until: >
    _ocp4_workload_rhoso_deployment_metallb_speaker.resources | length > 0 and
    _ocp4_workload_rhoso_deployment_metallb_speaker.resources[0].status.numberReady is defined and
    _ocp4_workload_rhoso_deployment_metallb_speaker.resources[0].status.numberReady > 0
  retries: 30
  delay: 10
  delegate_to: bastion

# ---- cert-manager verification ----

- name: Verify cert-manager is running
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: cert-manager
  register: _ocp4_workload_rhoso_deployment_certmgr_pods
  until: _ocp4_workload_rhoso_deployment_certmgr_pods.resources | length > 0
  retries: 30
  delay: 10
  delegate_to: bastion

- name: Display cert-manager status
  ansible.builtin.debug:
    msg: >-
      cert-manager pods:
      {{ _ocp4_workload_rhoso_deployment_certmgr_pods.resources
         | json_query('[?status.phase==`Running`]') | length }} running
      out of {{ _ocp4_workload_rhoso_deployment_certmgr_pods.resources | length }} total
  delegate_to: bastion
