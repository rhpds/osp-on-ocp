---
# AgnosticD (infra-openshift-cnv-create-inventory) already adds isolated VMs
# to inventory with:
#   ansible_ssh_host: <vm_name>   (e.g. nfsserver, compute01)
#   public_ip_address: <bastion external SSH hostname>
#   bastion_ssh_port: <bastion NodePort>
#   ansible_user: cloud-user
#
# The only missing piece is ansible_ssh_common_args with ProxyJump.
# With ProxyJump, the destination hostname is resolved by the JUMP HOST (bastion),
# not by the EE — so nfsserver/compute01 resolve correctly via cluster DNS.

- name: Configure isolated VM connections with bastion ProxyJump
  ansible.builtin.add_host:
    name: "{{ item }}"
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=no
      -o ProxyJump={{ hostvars[item]['ansible_user'] | default('cloud-user') }}@{{ hostvars[item]['public_ip_address'] }}:{{ hostvars[item]['bastion_ssh_port'] }}
  loop:
  - "{{ ocp4_workload_rhoso_deployment_nfs_host }}"
  - "{{ ocp4_workload_rhoso_deployment_compute_host }}"
