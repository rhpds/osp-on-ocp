---
# Resolve cluster-internal VM hostnames from the bastion (which has cluster DNS)
# and update their inventory entries so the EE can reach them via ProxyJump.
# This runs once at the start of the workload and makes all delegate_to tasks work natively.

- name: Resolve {{ ocp4_workload_rhoso_deployment_nfs_host }} IP from bastion DNS
  ansible.builtin.command:
    cmd: "getent hosts {{ ocp4_workload_rhoso_deployment_nfs_host }}"
  delegate_to: bastion
  register: _ocp4_workload_rhoso_deployment_nfs_addr
  changed_when: false

- name: Resolve {{ ocp4_workload_rhoso_deployment_compute_host }} IP from bastion DNS
  ansible.builtin.command:
    cmd: "getent hosts {{ ocp4_workload_rhoso_deployment_compute_host }}"
  delegate_to: bastion
  register: _ocp4_workload_rhoso_deployment_compute_addr
  changed_when: false

- name: Update {{ ocp4_workload_rhoso_deployment_nfs_host }} inventory with resolved IP and bastion ProxyJump
  ansible.builtin.add_host:
    name: "{{ ocp4_workload_rhoso_deployment_nfs_host }}"
    ansible_host: "{{ _ocp4_workload_rhoso_deployment_nfs_addr.stdout.split()[0] }}"
    ansible_user: "{{ ocp4_workload_rhoso_deployment_nfs_ssh_user }}"
    ansible_ssh_private_key_file: "{{ ocp4_workload_rhoso_deployment_nfs_ssh_key }}"
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=no
      -o ProxyJump={{ ansible_user }}@{{ ansible_host }}:{{ ansible_port | default(22) }}

- name: Update {{ ocp4_workload_rhoso_deployment_compute_host }} inventory with resolved IP and bastion ProxyJump
  ansible.builtin.add_host:
    name: "{{ ocp4_workload_rhoso_deployment_compute_host }}"
    ansible_host: "{{ _ocp4_workload_rhoso_deployment_compute_addr.stdout.split()[0] }}"
    ansible_user: "{{ ocp4_workload_rhoso_deployment_compute_ssh_user }}"
    ansible_ssh_private_key_file: "{{ ocp4_workload_rhoso_deployment_compute_ssh_key }}"
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=no
      -o ProxyJump={{ ansible_user }}@{{ ansible_host }}:{{ ansible_port | default(22) }}
