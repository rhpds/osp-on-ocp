---
# ============================================================================
# Phase toggles — set any to false to skip that phase
# ============================================================================
ocp4_workload_rhoso_deployment_phase_prerequisites: true
ocp4_workload_rhoso_deployment_phase_install_operators: true
ocp4_workload_rhoso_deployment_phase_security: true
ocp4_workload_rhoso_deployment_phase_nfs_server: true
ocp4_workload_rhoso_deployment_phase_network_isolation: true
ocp4_workload_rhoso_deployment_phase_control_plane: true
ocp4_workload_rhoso_deployment_phase_data_plane: true
ocp4_workload_rhoso_deployment_phase_validation: true
ocp4_workload_rhoso_deployment_phase_optional_services: false

# ============================================================================
# Lab environment
# ============================================================================
ocp4_workload_rhoso_deployment_guid: "{{ guid }}"
# Note: use tilde concatenation — '{{ guid }}' inside default() string is NOT evaluated
ocp4_workload_rhoso_deployment_bastion_ssh_private_key: "{{ bastion_ssh_key_path | default('~/.ssh/' ~ ocp4_workload_rhoso_deployment_guid ~ 'key.pem') }}"
ocp4_workload_rhoso_deployment_bastion_ssh_public_key: "{{ bastion_ssh_pubkey_path | default('~/.ssh/' ~ ocp4_workload_rhoso_deployment_guid ~ 'key.pub') }}"

# ============================================================================
# Delegation hosts — inventory hostnames for delegate_to.
# ============================================================================
ocp4_workload_rhoso_deployment_nfs_server_host: "nfsserver"
ocp4_workload_rhoso_deployment_compute_host: "{{ ocp4_workload_rhoso_deployment_compute_nodes[0].name }}"

# ============================================================================
# Working directory on the bastion.
# /tmp is always writable regardless of connection user.
# ============================================================================
ocp4_workload_rhoso_deployment_bastion_home: "/tmp"
ocp4_workload_rhoso_deployment_bastion_working_dir: "/tmp/openstack-files"

# Path to the role's files/ directory.
# In normal EE context role_path is defined. When running from the bastion
# via run_from_bastion.yml, this is overridden with the absolute path
# /tmp/rhoso-exec/role/files via the -e argument.
ocp4_workload_rhoso_deployment_role_files_path: "{{ role_path }}/files"

# SSH key on bastion for connecting to internal VMs (nfsserver, compute01)
ocp4_workload_rhoso_deployment_vm_ssh_key: "~/.ssh/{{ ocp4_workload_rhoso_deployment_guid }}key.pem"
ocp4_workload_rhoso_deployment_vm_ssh_user: "cloud-user"

# Virtualenv on bastion with ansible + kubernetes.core + community.crypto
ocp4_workload_rhoso_deployment_bastion_venv: "/opt/virtualenvs/k8s"

# ============================================================================
# Content files — OpenStack YAML manifests shipped in the role's files/ dir.
# ============================================================================
ocp4_workload_rhoso_deployment_files_directory: "openstack-files"

ocp4_workload_rhoso_deployment_content_files:
- osp-ng-nncp-w1.yaml
- osp-ng-nncp-w2.yaml
- osp-ng-nncp-w3.yaml
- osp-ng-dataplane-node-set-deploy.yaml
- osp-ng-dataplane-netconfig.yaml
- osp-ng-openstack-operator.yaml
- osp-ng-openstack-operator-init.yaml
- osp-ng-ctlplane-deploy.yaml
- osp-ng-ctlplane-secret.yaml
- osp-ng-dataplane-deployment.yaml
- osp-ng-netattach.yaml
- osp-ng-metal-lb-ip-address-pools.yaml
- osp-ng-metal-lb-l2-advertisements.yaml
- osp-ng-libvirt-secret.yaml
- nfs-cinder-conf

ocp4_workload_rhoso_deployment_uuid_replacement_files:
- osp-ng-nncp-w1.yaml
- osp-ng-nncp-w2.yaml
- osp-ng-nncp-w3.yaml
- osp-ng-dataplane-node-set-deploy.yaml
- osp-ng-dataplane-netconfig.yaml

# ============================================================================
# NFS server
# ============================================================================
ocp4_workload_rhoso_deployment_nfs_server_ip: "172.18.0.13"
ocp4_workload_rhoso_deployment_nfs_cinder_path: "/nfs/cinder"
ocp4_workload_rhoso_deployment_nfs_glance_path: "/nfs/glance"
ocp4_workload_rhoso_deployment_nfs_aap_path: "/nfs/aap"

# ============================================================================
# Network configuration
# ============================================================================
ocp4_workload_rhoso_deployment_networks:
  ctlplane:
    cidr: "172.22.0.0/24"
    allocation_range_start: "172.22.0.100"
    allocation_range_end: "172.22.0.120"
    allocation_range2_start: "172.22.0.150"
    allocation_range2_end: "172.22.0.200"
    metallb_range_start: "172.22.0.80"
    metallb_range_end: "172.22.0.90"
    ipam_range_start: "172.22.0.30"
    ipam_range_end: "172.22.0.70"
    nncp_range_start: "172.22.0.10"
    nncp_range_end: "172.22.0.12"
  external:
    cidr: "172.21.0.0/24"
    allocation_range_start: "172.21.0.61"
    allocation_range_end: "172.21.0.90"
  internalapi:
    vlan: 20
    cidr: "172.17.0.0/24"
    allocation_range_start: "172.17.0.100"
    allocation_range_end: "172.17.0.250"
    metallb_range_start: "172.17.0.80"
    metallb_range_end: "172.17.0.90"
    ipam_range_start: "172.17.0.30"
    ipam_range_end: "172.17.0.70"
    nncp_range_start: "172.17.0.10"
    nncp_range_end: "172.17.0.12"
  storage:
    vlan: 21
    cidr: "172.18.0.0/24"
    allocation_range_start: "172.18.0.100"
    allocation_range_end: "172.18.0.250"
    metallb_range_start: "172.18.0.80"
    metallb_range_end: "172.18.0.90"
    ipam_range_start: "172.18.0.30"
    ipam_range_end: "172.18.0.70"
    nncp_range_start: "172.18.0.10"
    nncp_range_end: "172.18.0.12"
  tenant:
    vlan: 22
    cidr: "172.19.0.0/24"
    allocation_range_start: "172.19.0.100"
    allocation_range_end: "172.19.0.250"
    metallb_range_start: "172.19.0.80"
    metallb_range_end: "172.19.0.90"
    ipam_range_start: "172.19.0.30"
    ipam_range_end: "172.19.0.70"
    nncp_range_start: "172.19.0.10"
    nncp_range_end: "172.19.0.12"

# ============================================================================
# OpenStack namespaces
# ============================================================================
ocp4_workload_rhoso_deployment_openstack_operators_namespace: "openstack-operators"
ocp4_workload_rhoso_deployment_openstack_namespace: "openstack"

# ============================================================================
# Compute node configuration
# ============================================================================
ocp4_workload_rhoso_deployment_compute_nodes:
- name: "compute01"
  hostname: "compute01.lab.sandbox-{{ guid }}-ocp4-cluster.svc.cluster.local"
  ansible_host: "172.22.0.100"
  ctlplane_ip: "172.22.0.100"
  internalapi_ip: "172.17.0.100"
  storage_ip: "172.18.0.100"
  tenant_ip: "172.19.0.100"
  external_ip: "172.21.0.100"

# ============================================================================
# Worker node external IPs
# ============================================================================
ocp4_workload_rhoso_deployment_worker_external_ips:
  worker_1: "{{ rhoso_external_ip_worker_1 | default('172.21.0.21') }}"
  worker_2: "{{ rhoso_external_ip_worker_2 | default('172.21.0.22') }}"
  worker_3: "{{ rhoso_external_ip_worker_3 | default('172.21.0.23') }}"

# ============================================================================
# Bastion external IP (for validation phase)
# ============================================================================
ocp4_workload_rhoso_deployment_bastion_external_ip: "{{ rhoso_external_ip_bastion | default('172.21.0.50') }}"

# ============================================================================
# Credentials
# ============================================================================
ocp4_workload_rhoso_deployment_registry_username: "{{ registry_username | default('') }}"
ocp4_workload_rhoso_deployment_registry_password: "{{ registry_password | default('') }}"
ocp4_workload_rhoso_deployment_rhc_activation_keys: "{{ rhc_activation_keys | default([]) }}"
ocp4_workload_rhoso_deployment_rhc_organization: "{{ rhc_organization | default('') }}"

# Default password (base64 encoded 'openstack')
ocp4_workload_rhoso_deployment_default_password_b64: "b3BlbnN0YWNr"

# ============================================================================
# NNCP worker node names
# ============================================================================
ocp4_workload_rhoso_deployment_nncp_names:
- osp-multi-nic-worker-ocp4-worker1
- osp-multi-nic-worker-ocp4-worker2
- osp-multi-nic-worker-ocp4-worker3

# ============================================================================
# Timeouts
# ============================================================================
ocp4_workload_rhoso_deployment_operator_wait_timeout: 600
ocp4_workload_rhoso_deployment_deployment_wait_timeout: 1800
