---
- name: Obtain AAP connection info and API token
  ansible.builtin.include_tasks: get_aap_connection.yml
  when: ocp4_workload_rhoso_migration_scenarios_phase_aap_connection | bool

- name: Create migration scenario job templates
  ansible.builtin.include_tasks: create_scenario_job_templates.yml
  when: ocp4_workload_rhoso_migration_scenarios_phase_job_templates | bool

- name: Report deployment completion
  agnosticd.core.agnosticd_user_info:
    msg:
    - ""
    - "Migration Scenarios Deployed"
    - "============================"
    - ""
    - "AAP namespace: {{ ocp4_workload_rhoso_migration_scenarios_aap_namespace }}"
    - "Scenarios deployed: {{ ocp4_workload_rhoso_migration_scenarios_list | join(', ') }}"
    - "AAP Dashboard: {{ _ocp4_workload_migration_scenarios_gateway_url | default('(check AAP route)') }}"
    - ""
    - "Next: Open AAP -> Resources -> Templates -> launch your scenario job template."
    - ""
  delegate_to: bastion
